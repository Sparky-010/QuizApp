<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Quiz App</title>
  <style>
    *{
      transition: all 300ms ease-in-out;
    }
    button{
      background: #efe4b7;
      font-weight: 600;
      padding: 6px 10px;
      display: block;
      width: 100%;
      border-radius: 7px;
      margin-bottom: 10px;
      text-align: left;
      cursor: pointer;
    }
  </style>
</head>
<body class="max-sm:text-[1.2rem] bg-amber-200 w-full font-sans">
  <div class="h-[85vh] w-full justify-items-center content-center text-center mx-auto">
    <!-- welcome -->
    <div class="rounded-[7px] w-[95%] md:w-fit p-9 text-center content-center bg-amber-50" id="welcome">
      <h1 class="font-semibold text-4xl underline">Quiz Time</h1>
      <p class="my-2.5">Test Your knowledge with this fun quizes</p>
      <input type="button" class="p-3 cursor-pointer border w-[200px] bg-amber-300 text-amber-50 font-bold rounded-[7px]" id="start" value="Start Quiz" title="Start Quiz">
    </div>
    <!-- quest and ans -->
    <div class="rounded-[7px] w-[95%] md:w-[40%] p-9 text-center content-center bg-amber-50" id="questBlock" style="display: none;">
      <h2 id="quest" class="text-center font-bold text-2xl mb-2"></h2>
      <div class="flex justify-between bg-amber-100 rounded-[7px] py-1 px-2 mb-3">
        <span>Question: <span id="Qnum"></span></span>
        <span>score: <span id="score"></span></span>
      </div>

      <div id="opts"></div>
      <!-- progress -->
      <div class="w-full bg-amber-100 rounded-full h-3">
        <div class="bg-amber-300 h-full rounded-full" id="progress" style="width: 0;"></div>
      </div>
    </div>
    <!-- end result -->
    <div class="rounded-[7px] w-[95%] md:w-fit p-5 md:p-9 text-center content-center bg-amber-50 text-[1.2rem]" id="endResult" style="display: none;">
      <h2 class="font-semibold text-4xl underline">Quiz Result</h2>

      <p class="mt-5 bg-amber-100">You Scored: <span class="block font-bold border-r px-2.5 bg-amber-200" id="finScore"></span></p><!--final score-->

      <p class="my-4 w-full shadow shadow-amber-300 font-semibold" id="cmt"></p><!--comment-->
      <input type="button" class="p-3 cursor-pointer border w-[200px] bg-amber-300 text-amber-50 font-bold rounded-[7px]" id="restart" value="Restart Quiz" title="Restart Quiz">
    </div>
  </div>
  <footer class="absolute bottom-0 bg-gray-800 w-full text-gray-200 font-semibold text-center text-[.9rem] mt-5 py-5">
    <p>&copy; To-Do App</p>
    <i class="underline py-1"><a href="http://sparky-010.github.io/dev" target="_blank" rel="noopener noreferrer" style="letter-spacing: 3px;">Nk.dev profile.</a></i>
    <h5><i>@ NK.dev... 2026</i></h5>
  </footer>
  <script>
    const msg = document.getElementById('msg')
    const start = document.getElementById('start')
    const welcome = document.getElementById('welcome')
    const questBlock = document.getElementById('questBlock')
    const progress = document.getElementById('progress')
    let scoreValue = 0;
    const quests = [
          {
            quest: 'What is HTML in full?',
            opt1: 'Hypher Text Make-up Language',
            opt2: 'Hyper Text Mark-Up Language',
            opt3: 'Programming Language',
            ans: 'Hyper Text Mark-Up Language'
          },
          {
            quest: 'What is JS in full?',
            opt1: 'JavaScript Language',
            opt2: 'Java Scripts',
            opt3: 'JavaScript',
            ans: 'JavaScript'
          },
          {
            quest: 'What is CSS in full?',
            opt1: 'Cascading Style Sheet',
            opt2: 'Creating Style Sheet',
            opt3: 'Styling Language',
            ans: 'Cascading Style Sheet'
          },
          {
            quest: 'What level of language is JavaScript?',
            opt1: 'Program Level Language',
            opt2: 'High Level language',
            opt3: 'Low Level Language',
            ans: 'High Level language'
          }
    ]
    start.onclick = ()=>{
      welcome.style.display = 'none';
      questBlock.style.display = 'block'
    }

    // display questions
    let i = 0, n = 0, m = 0
    const opts = document.getElementById('opts')
    function disQuest() {
      const headQ = document.getElementById('quest')
      const Qnum = document.getElementById('Qnum')
      let score = document.getElementById('score')
      score.innerText = scoreValue
      
      Qnum.innerText = `${n+1} of ${quests.length}`
      headQ.textContent = quests[n].quest
      opts.innerHTML = `<button>${quests[n].opt1}</button>
                        <button>${quests[n].opt2}</button>
                        <button>${quests[n].opt3}</button>`
      n < quests.length - 1 ? n++ : n = quests.length - 1
    }
    disQuest()

    // progress bar
    function progressBar(){progress.style.width = `${((i < quests.length ? i+1 : i)  / quests.length) * 100}%`}
    // correct Ans
    function correctAns() {const progress = document.getElementById('progress');disQuest()}
    // update score
    function updateScore() {scoreValue < quests.length ? scoreValue++ : scoreValue = quests.length}

    // check Answer onclick
    questBlock.onclick = e => {
      if (e.target.tagName === 'BUTTON') {
        setTimeout(finalResult, 1000)
        if (e.target.innerText === quests[i].ans) {
          e.target.style.background = '#c5f4c5'
          updateScore();
          setTimeout(correctAns, 1000)
        }else{
          // wrong ans
          e.target.style.background = '#eca9a9'
          setTimeout(disQuest, 1000)
        }
        progressBar(); 
        i < quests.length - 1 ? i++ : i = quests.length - 1
      }
      return
    }

    // finalResult
    function finalResult() {
      const endResult = document.getElementById('endResult')
      const finScore = document.getElementById('finScore')
      m++
      if (m===quests.length) {
        questBlock.style.display = 'none'
        endResult.style.display = 'block'
        finScore.innerText = `${scoreValue} out of ${quests.length}`
        comment(scoreValue)
      }
    }
    // comment
    function comment(avgScore) {
      const cmt = document.getElementById('cmt')
      cmt.innerText = ''
      let calScoreValue = (avgScore / quests.length) * 100
      console.log(calScoreValue);
      if (calScoreValue < 30) {
        cmt.innerText = 'You did poor!, Try again'
      }else if (calScoreValue >= 30 && calScoreValue < 50) {
        cmt.innerText = 'Try to keep up!'
      }else if (calScoreValue >= 50 && calScoreValue < 60) {
        cmt.innerText = 'You can do better!'
      }else if (calScoreValue >= 60 && calScoreValue < 80) {
        cmt.innerText = 'You did good, keep up!'
      }else{
        cmt.innerText = 'Excellent ✅, Go again.'
      }
    }
    // retake quize
    document.getElementById('restart').onclick = ()=>{
      questBlock.style.display = 'block'; endResult.style.display = 'none'
      opts.innerHTML = ''; n = i = m = scoreValue = 0
      disQuest();
      progress.style.width = 0
    }
  </script>
</body>
</html>
